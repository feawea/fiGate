name: fiGate

options:
  minimumXcodeGenVersion: 2.45.2
  createIntermediateGroups: true
  bundleIdPrefix: com.figate
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: NO

packages:
  fiGatePackage:
    path: .

fileGroups:
  - README.md
  - Package.swift
  - config
  - scripts
  - Support

targets:
  fiGate:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: fiGateApp/App.swift
      - path: fiGateApp/ContentView.swift
      - path: fiGateApp/Views
      - path: fiGateApp/HostServices
    dependencies:
      - package: fiGatePackage
        product: fiGateCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.figate.app
        INFOPLIST_FILE: Support/fiGate-Info.plist
        PRODUCT_NAME: fiGate
        SWIFT_EMIT_LOC_STRINGS: NO

schemes:
  fiGate:
    build:
      targets:
        fiGate: all
    run:
      config: Debug
